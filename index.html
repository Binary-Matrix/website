<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suman | Dhurandhar Genesis</title>
    <style>
        :root {
            --bg: #050200;
            --ember: #ff4500;
            --magma: #ff8c00;
            --machine-gray: #1a1a1a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Courier New', monospace; overflow: hidden; 
            height: 100vh;
        }

        /* === ADVANCED MACHINE CURSOR === */
        #cursor-main {
            position: fixed; width: 40px; height: 40px; border: 1px solid var(--ember);
            pointer-events: none; z-index: 20000; transition: transform 0.1s ease;
        }
        #cursor-dot {
            position: fixed; width: 4px; height: 4px; background: #fff;
            border-radius: 50%; pointer-events: none; z-index: 20001;
        }
        .cursor-ring {
            position: fixed; border: 1px dashed var(--magma); border-radius: 50%;
            pointer-events: none; z-index: 19999; animation: rotate 4s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* === 3S IGNITION & BLAST === */
        #ignite-screen {
            position: fixed; inset: 0; background: #000; z-index: 30000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .loading-text { font-size: 5rem; font-weight: 900; color: #111; position: absolute; z-index: -1; }
        #hold-btn {
            width: 120px; height: 120px; border-radius: 50%; border: 2px solid var(--ember);
            background: transparent; color: var(--ember); font-weight: bold; cursor: pointer;
            position: relative; overflow: hidden;
        }
        #hold-progress {
            position: absolute; bottom: 0; left: 0; width: 100%; background: var(--ember);
            height: 0%; transition: 0.1s linear; opacity: 0.5;
        }

        #blast-flash {
            position: fixed; inset: 0; background: #fff; opacity: 0; z-index: 30001; pointer-events: none;
        }

        /* === UI ELEMENTS === */
        .wrapper { 
            width: 95%; max-width: 1200px; margin: 0 auto; padding: 20px; 
            display: grid; grid-template-columns: 1fr 350px; gap: 20px; opacity: 0; transition: 1s;
        }

        .main-panel { background: rgba(10,5,0,0.9); border: 1px solid var(--ember); padding: 30px; position: relative; }
        
        /* Advanced Progress Bar */
        .adv-progress-wrap { margin: 20px 0; border: 1px solid #333; padding: 4px; border-radius: 20px; }
        .adv-progress-bar { 
            height: 12px; background: linear-gradient(90deg, var(--ember), #fff); 
            width: 63%; border-radius: 10px; position: relative;
            box-shadow: 0 0 15px var(--ember);
        }
        
        /* Special Button & Love Graphics */
        #special-btn {
            background: transparent; border: 1px solid var(--magma); color: var(--magma);
            padding: 10px 20px; margin-top: 20px; font-weight: bold; transition: 0.3s;
        }
        #special-btn:hover { background: var(--magma); color: #000; }
        
        .love-msg { 
            position: fixed; pointer-events: none; font-size: 2rem; z-index: 15000; 
            transition: 0.2s linear; display: none; 
        }

        /* Games & Status */
        .status-box { font-size: 0.8rem; line-height: 2; border-top: 1px solid #222; margin-top: 20px; padding-top: 10px;}
        .yet-to-complete { color: #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }

        #yt-audio { position: absolute; top: -999px; }

    </style>
</head>
<body>

<div id="cursor-main"></div>
<div id="cursor-dot"></div>
<div class="cursor-ring" style="width: 60px; height: 60px;"></div>

<div id="blast-flash"></div>

<div id="ignite-screen">
    <div class="loading-text" id="loader-pct">000</div>
    <button id="hold-btn">
        <div id="hold-progress"></div>
        START
    </button>
    <p style="margin-top: 20px; color: #333; font-size: 0.7rem; letter-spacing: 5px;">GALAXY BOOK 5 ENGINE</p>
</div>

<div id="yt-audio"></div>

<div class="wrapper" id="main-ui">
    <div class="main-panel">
        <h1 style="font-size: 3rem; color: var(--ember);">SUMAN NEUPANE</h1>
        <p style="color: #666;">// DHURANDHAR_GENESIS_v5.0</p>
        
        <div class="adv-progress-wrap">
            <div class="adv-progress-bar"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 0.7rem;">
            <span>SYSTEM SYNC: 63%</span>
            <span>OS: UBUNTU 26.04 LTS</span>
        </div>

        <button id="special-btn" onclick="initLove()">ACTIVATE CORE_EMOTION</button>
        
        <div class="status-box">
            <div>[ST] FLUTE_G_BASS: ONLINE</div>
            <div>[ST] HARDWARE_STORE_INV: SYNCED</div>
            <div>[ST] NEB_EXAMS: <span class="yet-to-complete">YET TO COMPLETE</span></div>
        </div>
    </div>

    <div class="main-panel" style="display: flex; flex-direction: column; gap: 15px;">
        <h3 style="color: var(--magma); border-bottom: 1px solid #333;">TASK_MODULE</h3>
        <canvas id="snake-cvs" width="300" height="250" style="background:#000; border: 1px solid #111;"></canvas>
        <p style="font-size: 0.6rem; color: #444;">MADE WITH GALAXY BOOK 5 ENGINE // KATHMANDU_NODE</p>
    </div>
</div>

<script>
    let player;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-audio', {
            height: '0', width: '0', videoId: 'OgPRcW4ytmE',
            playerVars: { 'start': 10, 'loop': 1, 'playlist': 'OgPRcW4ytmE' }
        });
    }

    // 1. 3-Second Blast Ignition
    const holdBtn = document.getElementById('hold-btn');
    const holdProg = document.getElementById('hold-progress');
    const loaderPct = document.getElementById('loader-pct');
    let holdActive = false, holdVal = 0;

    holdBtn.onmousedown = () => { holdActive = true; };
    window.onmouseup = () => { holdActive = false; holdVal = 0; updateHold(); };

    setInterval(() => {
        if(holdActive && holdVal < 100) {
            holdVal += 1.1; // Approx 3 seconds
            updateHold();
            if(holdVal >= 100) triggerBlast();
        }
    }, 30);

    function updateHold() {
        holdProg.style.height = holdVal + "%";
        loaderPct.innerText = Math.floor(holdVal).toString().padStart(3, '0');
    }

    function triggerBlast() {
        holdActive = false;
        // Sound
        const ac = new AudioContext();
        const osc = ac.createOscillator();
        const g = ac.createGain();
        osc.type = 'brownian'; // Noise for blast
        osc.connect(g); g.connect(ac.destination);
        g.gain.setValueAtTime(1, ac.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ac.currentTime + 1);
        osc.start(); osc.stop(ac.currentTime + 1);

        document.getElementById('blast-flash').style.opacity = '1';
        setTimeout(() => {
            document.getElementById('ignite-screen').style.display = 'none';
            document.getElementById('blast-flash').style.opacity = '0';
            document.getElementById('main-ui').style.opacity = '1';
            document.body.style.overflow = 'auto';
            player.playVideo();
        }, 200);
    }

    // 2. Responsive Machine Cursor
    const cm = document.getElementById('cursor-main');
    const cd = document.getElementById('cursor-dot');
    const cr = document.querySelector('.cursor-ring');
    document.addEventListener('mousemove', (e) => {
        const { clientX: x, clientY: y } = e;
        cm.style.transform = `translate(${x - 20}px, ${y - 20}px) rotate(${x/5}deg)`;
        cd.style.left = x - 2 + 'px'; cd.style.top = y - 2 + 'px';
        cr.style.left = x - 30 + 'px'; cr.style.top = y - 30 + 'px';
        
        // Letter evasion
        document.querySelectorAll('.love-msg').forEach(msg => {
            const r = msg.getBoundingClientRect();
            const d = Math.hypot(x - r.left, y - r.top);
            if(d < 100) {
                msg.style.transform = `translate(${(r.left - x)*2}px, ${(r.top - y)*2}px)`;
                msg.style.opacity = '0.5';
            }
        });
    });

    // 3. Special Love Button
    function initLove() {
        const texts = ['🧸', 'I', 'L', 'O', 'V', 'E', 'Y', 'O', 'U'];
        texts.forEach((t, i) => {
            const el = document.createElement('div');
            el.className = 'love-msg';
            el.style.display = 'block';
            el.innerText = t;
            el.style.left = (40 + i*5) + '%';
            el.style.top = '50%';
            el.style.color = i === 0 ? 'white' : 'var(--ember)';
            document.body.appendChild(el);
            setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 1000); }, 5000);
        });
    }

    // 4. Snake Task
    const scc = document.getElementById('snake-cvs');
    const sctx = scc.getContext('2d');
    let snk = [{x:10, y:10}], fd = {x:5, y:5};
    setInterval(() => {
        let h = {x: snk[0].x+1, y: snk[0].y};
        snk.unshift(h); snk.pop();
        if(h.x > 20) snk = [{x:0, y:10}];
        sctx.fillStyle = '#000'; sctx.fillRect(0,0,300,250);
        sctx.fillStyle = 'var(--ember)'; snk.forEach(p => sctx.fillRect(p.x*15, p.y*15, 13, 13));
    }, 150);
</script>
</body>
</html>
