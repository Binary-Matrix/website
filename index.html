<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suman | Dhurandhar Magma v4</title>
    <style>
        :root {
            --bg: #080400;
            --ember: #ff4500;
            --magma: #ff8c00;
            --glass: rgba(25, 10, 0, 0.9);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }

        /* === CURSOR === */
        #custom-cursor {
            position: fixed; width: 10px; height: 10px; background: #fff;
            border-radius: 50%; pointer-events: none; z-index: 10000;
            box-shadow: 0 0 20px var(--ember); transform: translate(-50%, -50%);
        }

        /* === IGNITION OVERLAY (5s Hold) === */
        #ignite-overlay {
            position: fixed; inset: 0; background: #000; z-index: 20000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .hold-container { position: relative; width: 150px; height: 150px; }
        .progress-ring {
            position: absolute; top: 0; left: 0; width: 150px; height: 150px;
            transform: rotate(-90deg);
        }
        .progress-ring circle {
            fill: transparent; stroke: var(--ember); stroke-width: 8;
            stroke-dasharray: 440; stroke-dashoffset: 440; transition: stroke-dashoffset 0.1s linear;
        }
        #ignite-btn {
            position: absolute; inset: 15px; border-radius: 50%; border: none;
            background: #111; color: var(--ember); font-weight: 900; cursor: pointer;
        }

        /* === DJ VISUALIZER === */
        .dj-mixer {
            display: flex; align-items: flex-end; gap: 3px; height: 50px; padding: 10px;
            background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid var(--ember);
        }
        .bar { width: 6px; background: var(--ember); height: 10px; animation: bounce 0.5s ease-in-out infinite alternate; }
        @keyframes bounce { 
            0% { height: 5px; filter: brightness(1); } 
            100% { height: 40px; filter: brightness(1.5); box-shadow: 0 0 10px var(--ember); }
        }

        /* === PROGRESS BAR === */
        .progress-container { width: 100%; background: #111; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .progress-fill { width: 63%; height: 100%; background: linear-gradient(90deg, var(--ember), var(--magma)); }

        /* === TASK LOCK === */
        .lock-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .lens-task { width: 40px; height: 40px; border: 2px solid #fff; border-radius: 50%; cursor: pointer; position: absolute; }

        .wrapper { width: 90%; max-width: 1100px; margin: 0 auto; padding: 20px; }
        .card { background: var(--glass); border: 1px solid rgba(255,69,0,0.3); padding: 20px; position: relative; margin-bottom: 20px; }
        
        canvas.game-cvs { width: 100%; background: #000; height: 250px; }

        #yt-audio { position: absolute; top: -999px; visibility: hidden; }
    </style>
</head>
<body>

<div id="custom-cursor"></div>

<!-- Hold to Ignite -->
<div id="ignite-overlay">
    <div class="hold-container">
        <svg class="progress-ring"><circle id="ring-circle" cx="75" cy="75" r="70"></circle></svg>
        <button id="ignite-btn">HOLD 5S</button>
    </div>
    <p style="margin-top: 20px; color: #555; letter-spacing: 3px;">INITIALIZING DHURANDHAR MODULE</p>
</div>

<div id="yt-audio"></div>

<div class="wrapper">
    <div class="card" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
            <h2 style="color: var(--magma);">SUMAN NEUPANE</h2>
            <div class="progress-container"><div class="progress-fill"></div></div>
            <span style="font-size: 0.7rem; color: var(--ember);">SYSTEM STABILITY: 63%</span>
        </div>
        <div class="dj-mixer" id="mixer">
            <!-- Bars generated by JS -->
        </div>
    </div>

    <div class="card" id="game-container">
        <div class="lock-overlay" id="lock">
            <h3 style="margin-bottom: 10px;">TASK: DESTROY 3 LENSES</h3>
            <div id="task-area" style="position: relative; width: 100%; height: 200px;"></div>
        </div>
        <h3 style="color: var(--ember); margin-bottom: 15px;">NEURAL_SNAKE_V4</h3>
        <canvas id="snake-canvas" class="game-cvs" width="400" height="400"></canvas>
    </div>

    <div class="card">
        <button onclick="boom('conf')" style="padding: 15px; background: var(--ember); border: none; font-weight: bold; cursor: pointer;">POP CONFETTI</button>
        <button onclick="boom('flower')" style="padding: 15px; background: var(--magma); border: none; font-weight: bold; cursor: pointer;">BOOM FLOWERS</button>
    </div>
</div>

<script>
    // 1. YouTube API Control
    let player;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-audio', {
            height: '0', width: '0',
            videoId: 'OgPRcW4ytmE',
            playerVars: { 'autoplay': 0, 'start': 10, 'loop': 1, 'playlist': 'OgPRcW4ytmE' },
            events: { 'onStateChange': (e) => { if(e.data === YT.PlayerState.ENDED) player.seekTo(10); } }
        });
    }

    // 2. 5-Second Hold Logic
    const btn = document.getElementById('ignite-btn');
    const ring = document.getElementById('ring-circle');
    let holdTimer, progress = 0;

    btn.addEventListener('mousedown', startHold);
    btn.addEventListener('mouseup', stopHold);
    btn.addEventListener('touchstart', startHold);
    btn.addEventListener('touchend', stopHold);

    function startHold() {
        holdTimer = setInterval(() => {
            progress += 2;
            ring.style.strokeDashoffset = 440 - (progress / 100 * 440);
            if (progress >= 100) {
                clearInterval(holdTimer);
                document.getElementById('ignite-overlay').style.display = 'none';
                player.playVideo();
                player.seekTo(10);
            }
        }, 100);
    }
    function stopHold() { clearInterval(holdTimer); progress = 0; ring.style.strokeDashoffset = 440; }

    // 3. DJ Mixer Animation
    const mixer = document.getElementById('mixer');
    for(let i=0; i<15; i++) {
        let bar = document.createElement('div');
        bar.className = 'bar';
        bar.style.animationDelay = (Math.random() * 0.5) + 's';
        mixer.appendChild(bar);
    }

    // 4. Task Lock
    let solved = 0;
    const taskArea = document.getElementById('task-area');
    for(let i=0; i<3; i++) {
        let l = document.createElement('div');
        l.className = 'lens-task';
        l.style.left = Math.random()*80 + '%';
        l.style.top = Math.random()*80 + '%';
        l.onclick = () => { l.remove(); solved++; if(solved === 3) document.getElementById('lock').remove(); };
        taskArea.appendChild(l);
    }

    // 5. Audio Effects & Particles
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(freq, type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function boom(type) {
        if(type === 'conf') playBeep(600, 'square'); // Pop
        else playBeep(150, 'sine'); // Boom
        
        for(let i=0; i<20; i++) {
            let p = document.createElement('div');
            p.style.position = 'fixed';
            p.style.left = '50%'; p.style.top = '80%';
            p.innerText = type === 'conf' ? '✨' : '🌸';
            p.style.transition = '2s';
            document.body.appendChild(p);
            setTimeout(() => {
                p.style.transform = `translate(${(Math.random()-0.5)*500}px, -400px) rotate(360deg)`;
                p.style.opacity = '0';
            }, 10);
            setTimeout(() => p.remove(), 2000);
        }
    }

    // Custom Cursor
    document.addEventListener('mousemove', (e) => {
        const c = document.getElementById('custom-cursor');
        c.style.left = e.clientX + 'px';
        c.style.top = e.clientY + 'px';
    });
</script>
</body>
</html>
