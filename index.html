<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suman | Ultimate Luxury Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap');

        :root {
            --obsidian: #050506;
            --gold: #d4af37;
            --platinum: #e5e4e2;
            --glass: rgba(255, 255, 255, 0.02);
            --border: 1px solid rgba(212, 175, 55, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        body { 
            background: var(--obsidian); 
            color: var(--platinum); 
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            height: 100vh;
        }

        #cursor {
            position: fixed; width: 6px; height: 6px; background: var(--gold);
            border-radius: 50%; pointer-events: none; z-index: 10000;
        }
        #cursor-follower {
            position: fixed; width: 40px; height: 40px; border: 1px solid var(--gold);
            border-radius: 50%; pointer-events: none; z-index: 9999;
            transition: transform 0.12s ease-out;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; position: relative; z-index: 10; }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 35px; border: var(--border); background: var(--glass);
            backdrop-filter: blur(20px); border-radius: 50px; margin-bottom: 30px;
        }

        .hero {
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;
            padding: 40px; background: var(--glass); border: var(--border);
            border-radius: 25px;
        }
        
        /* Photo Holder */
        .photo-container {
            width: 100%; height: 400px; border: 1px solid var(--gold);
            position: relative; overflow: hidden; background: #111;
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        .sound-board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .sound-btn {
            background: rgba(212, 175, 55, 0.03); border: var(--border);
            color: var(--platinum); padding: 30px; text-align: center;
            font-weight: 800; letter-spacing: 2px; transition: 0.4s;
            position: relative;
        }
        .sound-btn:hover { background: var(--gold); color: black; transform: translateY(-5px); }

        .fx-center { text-align: center; margin: 40px 0; }
        .fx-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 14px 40px; font-weight: 800; text-transform: uppercase;
            margin: 0 10px; transition: 0.3s;
        }
        .fx-btn:hover { background: var(--gold); color: black; }

        /* Floating Note Animation */
        .floating-note {
            position: fixed; color: var(--gold); font-family: monospace;
            pointer-events: none; z-index: 6000; animation: note-rise 2s forwards;
        }
        @keyframes note-rise {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* Particle CSS */
        .particle {
            position: fixed; pointer-events: auto; z-index: 5000;
            will-change: transform, opacity;
        }

        .game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .game-card { background: var(--glass); border: var(--border); border-radius: 20px; padding: 20px; text-align: center; }
        canvas { background: #000; border-radius: 12px; width: 100%; height: 140px; }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-follower"></div>

<div class="container">
    <nav>
        <div style="font-weight: 800; color: var(--gold);">SUMAN // APEX_LUXURY</div>
        <div style="font-size: 0.7rem; opacity: 0.6;">KATHMANDU // G-BASS PROTOCOL</div>
    </nav>

    <div class="hero">
        <div class="photo-container">
            <!-- Replace 'suman.jpg' with your actual photo file name -->
            <img src="suman.jpg" alt="Suman Neupane">
        </div>
        <div>
            <h1 style="font-size: 3.8rem; line-height: 1; font-weight: 800; margin-bottom: 20px;">SUMAN<br><span style="color: var(--gold)">NEUPANE</span></h1>
            
            <div class="sound-board">
                <button class="sound-btn" onclick="triggerInstrument('flute', 'SA RE GA MA')">G-BASS FLUTE</button>
                <button class="sound-btn" onclick="triggerInstrument('tabla', 'DHA DHIN DHIN')">TABLA</button>
                <button class="sound-btn" onclick="triggerInstrument('guitar', 'E A D G')">GUITAR</button>
                <button class="sound-btn" onclick="triggerInstrument('harmonium', 'BHAIRAVI')">HARMONIUM</button>
            </div>
        </div>
    </div>

    <div class="fx-center">
        <button class="fx-btn" onclick="partyPop()">Party Pop Confetti</button>
        <button class="fx-btn" onclick="flowerBurst()">Radial Flower Pulse</button>
    </div>

    <div class="game-grid">
        <div class="game-card"><canvas id="sn"></canvas></div>
        <div class="game-card"><canvas id="bl"></canvas></div>
        <div class="game-card"><canvas id="tr"></canvas></div>
    </div>
</div>

<script>
    let mX = 0, mY = 0;
    const cursor = document.getElementById('cursor');
    const follower = document.getElementById('cursor-follower');
    document.addEventListener('mousemove', (e) => {
        mX = e.clientX; mY = e.clientY;
        cursor.style.left = mX + 'px';
        cursor.style.top = mY + 'px';
        follower.style.transform = `translate(${mX - 20}px, ${mY - 20}px)`;
    });

    // --- Audio & Note Visualization ---
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    function triggerInstrument(type, notes) {
        const now = ctx.currentTime;
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        
        osc.frequency.setValueAtTime(type === 'flute' ? 880 : 220, now);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 1);
        osc.start(); osc.stop(now + 1);

        // Visual Note
        const el = document.createElement('div');
        el.className = 'floating-note';
        el.innerText = notes;
        el.style.left = mX + 'px';
        el.style.top = mY + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2000);
    }

    // --- Advanced Particle Physics (Slowdown & Mid-air Disappear) ---
    let particles = [];
    function spawn(type, x, y, isPop = false) {
        const p = document.createElement('div');
        p.className = 'particle';
        const isConf = type === 'conf';
        
        p.style.width = isConf ? '8px' : '25px';
        p.style.height = isConf ? '12px' : '25px';
        p.style.backgroundColor = isConf ? '#d4af37' : 'transparent';
        if(!isConf) p.innerText = '🌸';
        
        let px = x;
        let py = y;
        let vx = (Math.random() - 0.5) * (isPop ? 25 : 10);
        let vy = isPop ? (Math.random() * -20) : (Math.random() * 5);
        let opacity = 1;
        let rot = Math.random() * 360;

        if(!isConf) {
            p.onclick = () => {
                const toast = document.createElement('div');
                toast.innerText = "I LOVE YOU";
                toast.className = 'floating-note';
                toast.style.left = px + 'px'; toast.style.top = py + 'px';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1000);
            };
        }

        document.body.appendChild(p);

        particles.push({
            update: () => {
                // Gravity Slow Down Effect
                vy *= 0.96; // Friction/Air resistance
                vx *= 0.96;
                vy += 0.05; // Gentle gravity

                // Cursor Repulsion
                const dx = px - mX; const dy = py - mY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 100) { vx += dx/20; vy += dy/20; }

                px += vx; py += vy;
                rot += 2;
                
                // Mid-air disappearance
                opacity -= 0.005; 
                p.style.opacity = opacity;
                p.style.transform = `translate(${px}px, ${py}px) rotate(${rot}deg)`;

                if(opacity <= 0) { p.remove(); return false; }
                return true;
            }
        });
    }

    function partyPop() { for(let i=0; i<80; i++) spawn('conf', window.innerWidth/2, window.innerHeight, true); }
    function flowerBurst() { for(let i=0; i<30; i++) spawn('flow', window.innerWidth/2, window.innerHeight/2); }

    function run() {
        particles = particles.filter(p => p.update());
        requestAnimationFrame(run);
    }
    run();

    // --- Minimalist Game Renderers ---
    const sC = document.getElementById('sn').getContext('2d');
    setInterval(() => { sC.fillStyle='#000'; sC.fillRect(0,0,300,140); sC.fillStyle='#d4af37'; sC.fillRect(10,10,5,5); }, 100);
</script>
</body>
</html>
