<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suman | Premium Interactive Portfolio</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap');

        :root {
            --obsidian: #050506;
            --gold: #d4af37;
            --platinum: #e5e4e2;
            --glass: rgba(255, 255, 255, 0.02);
            --border: 1px solid rgba(212, 175, 55, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        
        body { 
            background: var(--obsidian); 
            color: var(--platinum); 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Custom Cursor */
        #cursor, #cursor-follower { position: fixed; pointer-events: none; z-index: 10000; }
        #cursor { width: 6px; height: 6px; background: var(--gold); border-radius: 50%; }
        #cursor-follower { width: 40px; height: 40px; border: 1px solid var(--gold); border-radius: 50%; transition: transform 0.12s ease-out; }

        @media (max-width: 768px) {
            * { cursor: auto !important; }
            #cursor, #cursor-follower { display: none; }
        }

        .container { 
            width: 90%; max-width: 1100px; 
            margin: 0 auto; padding: 20px; 
            position: relative; z-index: 10; 
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; border: var(--border); background: var(--glass);
            backdrop-filter: blur(20px); border-radius: 50px; margin-bottom: 30px;
        }

        /* Responsive Layout */
        .hero {
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 30px;
            padding: 30px; background: var(--glass); border: var(--border);
            border-radius: 25px; align-items: center;
        }

        @media (max-width: 850px) {
            .hero { grid-template-columns: 1fr; text-align: center; }
            nav { flex-direction: column; gap: 10px; border-radius: 20px; text-align: center; }
        }
        
        .photo-container {
            width: 100%; aspect-ratio: 1/1; border: 1px solid var(--gold);
            position: relative; overflow: hidden; background: #111;
        }
        .photo-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        .sound-board { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        @media (max-width: 480px) { .sound-board { grid-template-columns: 1fr; } }

        .sound-btn {
            background: rgba(212, 175, 55, 0.03); border: var(--border);
            color: var(--platinum); padding: 20px; text-align: center;
            font-weight: 800; letter-spacing: 2px; transition: 0.4s; font-size: 0.75rem;
        }
        .sound-btn:hover { background: var(--gold); color: black; transform: translateY(-3px); }

        .fx-center { text-align: center; margin: 40px 0; display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; }
        .fx-btn {
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 30px; font-weight: 800; text-transform: uppercase; transition: 0.3s;
        }
        .fx-btn:hover { background: var(--gold); color: black; box-shadow: 0 0 20px rgba(212,175,55,0.4); }

        .floating-note {
            position: fixed; color: var(--gold); font-family: monospace;
            pointer-events: none; z-index: 6000; animation: note-rise 2s forwards;
            font-weight: bold;
        }
        @keyframes note-rise {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-120px) scale(1.5); opacity: 0; }
        }

        .particle { position: fixed; z-index: 5000; will-change: transform, opacity; }

        /* Hidden Spotify Player */
        #spotify-player {
            position: fixed; bottom: -100px; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body onclick="startExperience()">

<div id="cursor"></div>
<div id="cursor-follower"></div>

<!-- Spotify Embed Code -->
<div id="spotify-player">
    <iframe id="sc-widget" src="https://open.spotify.com/embed/track/0KHOIkAcSHTH9S0H0wZV7Q?utm_source=generator&autoplay=1" 
    width="100%" height="152" frameBorder="0" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"></iframe>
</div>

<div class="container">
    <nav>
        <div style="font-weight: 800; color: var(--gold);">SUMAN // APEX_LUXURY</div>
        <div style="font-size: 0.6rem; opacity: 0.6;">KATHMANDU | G-BASS PROTOCOL</div>
    </nav>

    <div class="hero">
        <div class="photo-container">
            <img src="suman.jpg" alt="Suman">
        </div>
        <div>
            <h1 style="font-size: clamp(2rem, 7vw, 3.5rem); line-height: 1; font-weight: 800; margin-bottom: 15px;">SUMAN<br><span style="color: var(--gold)">NEUPANE</span></h1>
            
            <div class="sound-board">
                <button class="sound-btn" onclick="playEffect('SA RE GA MA')">G-BASS FLUTE</button>
                <button class="sound-btn" onclick="playEffect('DHA DHIN DHIN')">TABLA</button>
                <button class="sound-btn" onclick="playEffect('STRUM...')">GUITAR</button>
                <button class="sound-btn" onclick="playEffect('BHAIRAVI')">HARMONIUM</button>
            </div>
        </div>
    </div>

    <div class="fx-center">
        <button class="fx-btn" onclick="partyPop()">Party Pop</button>
        <button class="fx-btn" onclick="flowerBurst()">Flower Pulse</button>
    </div>
</div>

<script>
    let musicStarted = false;

    function startExperience() {
        if (!musicStarted) {
            // This triggers the Spotify iframe to play after the first user interaction
            const iframe = document.getElementById('sc-widget');
            iframe.src += "&autoplay=1";
            musicStarted = true;
        }
    }

    // Cursor Logic
    const cursor = document.getElementById('cursor');
    const follower = document.getElementById('cursor-follower');
    document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        follower.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
    });

    // Instrument Effects
    function playEffect(note) {
        const el = document.createElement('div');
        el.className = 'floating-note';
        el.innerText = note;
        el.style.left = Math.random() * window.innerWidth + 'px';
        el.style.top = window.innerHeight / 2 + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 2000);
    }

    // Particle Physics
    let particles = [];
    function spawn(type, isPop) {
        const p = document.createElement('div');
        p.className = 'particle';
        const isConf = type === 'conf';
        p.style.width = isConf ? '8px' : '28px';
        p.style.height = isConf ? '12px' : '28px';
        p.style.backgroundColor = isConf ? '#d4af37' : 'transparent';
        if(!isConf) {
            p.innerText = '🌸';
            p.style.fontSize = '24px';
            p.onclick = (e) => {
                const t = document.createElement('div');
                t.className = 'floating-note'; t.innerText = "I LOVE YOU";
                t.style.left = e.clientX + 'px'; t.style.top = e.clientY + 'px';
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 1000);
            };
        }

        let px = window.innerWidth / 2;
        let py = isPop ? window.innerHeight : window.innerHeight / 2;
        let vx = (Math.random() - 0.5) * (isPop ? 20 : 10);
        let vy = isPop ? -25 : -5;
        let op = 1;

        document.body.appendChild(p);
        particles.push({
            update: () => {
                vx *= 0.97; vy *= 0.97; vy += 0.1;
                px += vx; py += vy; op -= 0.007;
                p.style.opacity = op;
                p.style.transform = `translate(${px}px, ${py}px) rotate(${px}deg)`;
                if(op <= 0) { p.remove(); return false; }
                return true;
            }
        });
    }

    function partyPop() { for(let i=0; i<60; i++) spawn('conf', true); }
    function flowerBurst() { for(let i=0; i<25; i++) spawn('flow', false); }

    function run() {
        particles = particles.filter(p => p.update());
        requestAnimationFrame(run);
    }
    run();
</script>
</body>
</html>
