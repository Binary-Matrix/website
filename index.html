<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suman | Zenith Genesis</title>
    <style>
        :root {
            --bg: #030303;
            --neon-red: #ff3131;
            --neon-orange: #ff5e00;
            --glass: rgba(255, 255, 255, 0.03);
            --border: 1px solid rgba(255, 49, 49, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: none; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden; height: 100vh;
        }

        /* === MODERN MACHINE CURSOR === */
        #cursor {
            position: fixed; width: 30px; height: 30px; border: 2px solid var(--neon-red);
            border-radius: 5px; pointer-events: none; z-index: 30000;
            transition: transform 0.1s; display: flex; align-items: center; justify-content: center;
        }
        #cursor::after { content: ''; width: 4px; height: 4px; background: #fff; }

        /* === VIBRATING IGNITION CORE === */
        #ignite-screen {
            position: fixed; inset: 0; background: #000; z-index: 40000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .binary-flow {
            position: absolute; color: #111; font-size: 12px; pointer-events: none;
            width: 300px; height: 300px; overflow: hidden; text-align: center;
        }
        #ignite-btn {
            width: 140px; height: 140px; border-radius: 50%; border: 2px solid var(--neon-red);
            background: transparent; color: var(--neon-red); font-weight: 900;
            cursor: pointer; z-index: 2; transition: 0.1s;
        }
        .vibrate { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); } 20% { transform: translate(-1px, 0px); }
            40% { transform: translate(1px, -1px); } 100% { transform: translate(0px, 0px); }
        }

        /* === UI ARCHITECTURE === */
        .wrapper { 
            width: 90%; max-width: 1200px; margin: 0 auto; padding: 40px 0; 
            display: grid; grid-template-columns: 1fr 400px; gap: 30px; 
            opacity: 0; transition: 1.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .glass-panel { 
            background: var(--glass); backdrop-filter: blur(20px); 
            border: var(--border); padding: 30px; border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Modern Progress Bar */
        .progress-box { margin: 20px 0; }
        .bar-bg { width: 100%; height: 6px; background: #111; border-radius: 10px; overflow: hidden; }
        .bar-fill { 
            width: 0%; height: 100%; 
            background: linear-gradient(90deg, var(--neon-red), var(--neon-orange)); 
            transition: width 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Confetti Overlay */
        .confetti {
            position: fixed; width: 10px; height: 20px; z-index: 1000;
            pointer-events: none; animation: drop 4s linear forwards;
        }
        @keyframes drop {
            to { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        /* Love Msg */
        .love-text {
            position: fixed; font-weight: 900; font-size: 4rem; z-index: 5000;
            text-shadow: 0 0 20px var(--neon-red); pointer-events: none;
            transition: 0.5s ease-out;
        }

        /* Gaming Zone */
        canvas { background: #000; width: 100%; border-radius: 10px; border: 1px solid #222; }
        .game-card { margin-bottom: 20px; }

        .status-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="ignite-screen">
    <div class="binary-flow" id="binary"></div>
    <button id="ignite-btn">HOLD TO IGNITE</button>
    <p style="margin-top: 20px; letter-spacing: 5px; font-size: 10px; color: #444;">GALAXY BOOK 5 ENGINE</p>
</div>

<div id="yt-audio"></div>

<div class="wrapper" id="main-ui">
    <div class="left-col">
        <div class="glass-panel">
            <h1 style="font-size: 3.5rem; letter-spacing: -2px;">SUMAN NEUPANE</h1>
            <p style="color: var(--neon-red); font-size: 0.8rem; margin-bottom: 20px;">[ ARCHITECT_MODE ]</p>
            
            <div class="progress-box">
                <div style="display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 8px;">
                    <span>STABILITY_LOAD: <span id="pct-text">0%</span></span>
                    <span style="color: #ff3131;">WEBSITE UNDER PROGRESS</span>
                </div>
                <div class="bar-bg"><div class="bar-fill" id="main-bar"></div></div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px;">
                <div>
                    <h4 style="color: #555; margin-bottom: 10px;">SPECIALITY</h4>
                    <p style="font-size: 0.9rem;">Flute, Guitar, Tabla, Harmonium</p>
                    <p style="margin-top: 10px;"><span class="status-dot"></span> Status: Online</p>
                </div>
                <div>
                    <h4 style="color: #555; margin-bottom: 10px;">ENVIRONMENT</h4>
                    <p style="font-size: 0.9rem;">Ubuntu 26.04 LTS</p>
                    <p style="color: var(--neon-red); font-size: 0.8rem; margin-top: 10px;">YET TO COMPLETE</p>
                </div>
            </div>

            <button id="quantum-btn" style="margin-top: 40px; width: 100%; padding: 20px; background: transparent; border: 1px solid var(--neon-red); color: var(--neon-red); font-weight: bold; cursor: pointer;">ACTIVATE QUANTUM CONNECTION</button>
        </div>
    </div>

    <div class="right-col">
        <div class="glass-panel game-card">
            <h3 style="font-size: 0.8rem; margin-bottom: 15px; color: #666;">// NEURAL_SNAKE</h3>
            <canvas id="snake-canvas" height="200"></canvas>
        </div>
        <div class="glass-panel game-card">
            <h3 style="font-size: 0.8rem; margin-bottom: 15px; color: #666;">// STRIKE_BOWLING</h3>
            <canvas id="bowling-canvas" height="200"></canvas>
        </div>
    </div>
</div>

<script>
    // 1. YouTube Setup
    let player;
    const tag = document.createElement('script');
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-audio', {
            height: '0', width: '0', videoId: 'OgPRcW4ytmE',
            playerVars: { 'start': 10, 'loop': 1, 'playlist': 'OgPRcW4ytmE' }
        });
    }

    // 2. Binary Flow & Ignition
    const bin = document.getElementById('binary');
    for(let i=0; i<500; i++) bin.innerText += Math.round(Math.random());

    const btn = document.getElementById('ignite-btn');
    let holdTime = 0, isHolding = false;

    btn.onmousedown = () => { isHolding = true; btn.classList.add('vibrate'); playSound(440, 'sawtooth'); };
    window.onmouseup = () => { isHolding = false; holdTime = 0; btn.classList.remove('vibrate'); };

    setInterval(() => {
        if(isHolding) {
            holdTime += 3.3;
            if(holdTime >= 100) triggerBlast();
        }
    }, 100);

    function triggerBlast() {
        document.getElementById('ignite-screen').style.display = 'none';
        document.getElementById('main-ui').style.opacity = '1';
        player.playVideo();
        startConfetti();
        resetProgressBar();
    }

    // 3. Auto-Reset Progress Bar
    function resetProgressBar() {
        const bar = document.getElementById('main-bar');
        const text = document.getElementById('pct-text');
        
        function run() {
            bar.style.width = "63%";
            text.innerText = "63%";
            setTimeout(() => {
                bar.style.width = "0%";
                text.innerText = "0%";
                setTimeout(run, 5000);
            }, 10000);
        }
        run();
    }

    // 4. Confetti Engine
    function startConfetti() {
        for(let i=0; i<100; i++) {
            const c = document.createElement('div');
            c.className = 'confetti';
            c.style.left = Math.random() * 100 + "vw";
            c.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;
            c.style.animationDelay = Math.random() * 2 + "s";
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 6000);
        }
    }

    // 5. Quantum Love Connection
    document.getElementById('quantum-btn').onclick = (e) => {
        playSound(880, 'sine');
        const msg = document.createElement('div');
        msg.className = 'love-text';
        msg.innerText = "I LOVE YOU";
        msg.style.left = "50%"; msg.style.top = "50%";
        msg.style.transform = "translate(-50%, -50%)";
        msg.style.color = "var(--neon-red)";
        document.body.appendChild(msg);
        
        setTimeout(() => {
            msg.style.opacity = "0";
            msg.style.transform = "translate(-50%, -50%) scale(2)";
            setTimeout(() => msg.remove(), 1000);
        }, 3000);
    };

    // 6. Sound & Cursor
    function playSound(f, type) {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = type; o.frequency.value = f;
        o.connect(g); g.connect(ctx.destination);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1);
        o.start(); o.stop(ctx.currentTime + 1);
    }

    document.onmousemove = (e) => {
        const cur = document.getElementById('cursor');
        cur.style.left = e.clientX - 15 + 'px';
        cur.style.top = e.clientY - 15 + 'px';
        
        // Letter evasion
        document.querySelectorAll('.love-text').forEach(l => {
            const dist = Math.hypot(e.clientX - window.innerWidth/2, e.clientY - window.innerHeight/2);
            if(dist < 200) l.style.letterSpacing = "20px";
            else l.style.letterSpacing = "2px";
        });
    };

    // Games (Minimal Logic)
    const sctx = document.getElementById('snake-canvas').getContext('2d');
    setInterval(() => {
        sctx.fillStyle = '#000'; sctx.fillRect(0,0,400,200);
        sctx.fillStyle = 'var(--neon-red)'; sctx.fillRect(Math.random()*380, 50, 10, 10);
    }, 200);

    const bctx = document.getElementById('bowling-canvas').getContext('2d');
    setInterval(() => {
        bctx.fillStyle = '#000'; bctx.fillRect(0,0,400,200);
        bctx.fillStyle = '#fff'; bctx.beginPath(); bctx.arc(200, Math.random()*150, 8, 0, 7); bctx.fill();
    }, 300);

</script>
</body>
</html>
