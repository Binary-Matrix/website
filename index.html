<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suman | Ultimate Dhamaka Interface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;800&display=swap');

        :root {
            --gold: #d4af37;
            --obsidian: #050506;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        
        body { 
            background: var(--obsidian); 
            color: #e5e4e2; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- Full Responsiveness --- */
        .container { 
            width: 90%; max-width: 1200px; 
            margin: 0 auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 30px;
        }

        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; border: 1px solid rgba(212, 175, 55, 0.3);
            background: var(--glass); backdrop-filter: blur(10px); border-radius: 15px;
        }

        .hero {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px; padding: 30px; border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px; background: var(--glass);
        }

        .photo-box {
            width: 100%; aspect-ratio: 1/1; border: 2px solid var(--gold);
            overflow: hidden; background: #111;
        }
        .photo-box img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Buttons & Instruments --- */
        .sound-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            margin-top: 20px; 
        }

        .btn {
            background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold);
            color: var(--gold); padding: 15px; font-weight: 800;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: var(--gold); color: black; transform: scale(1.02); }

        /* --- Particle System --- */
        .particle {
            position: fixed; pointer-events: none; z-index: 9999;
            will-change: transform, opacity;
        }

        /* --- Games Section --- */
        .game-section {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px; width: 100%;
        }
        .game-card {
            background: #000; border: 1px solid var(--gold);
            padding: 15px; border-radius: 15px; text-align: center;
        }
        canvas { width: 100%; height: 150px; background: #080808; border-radius: 8px; }

        /* Hidden Music Player */
        #yt-player { position: absolute; top: -999px; left: -999px; visibility: hidden; }

        @media (max-width: 600px) {
            nav { flex-direction: column; gap: 10px; }
            .hero { padding: 15px; }
            .sound-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body onclick="startDhamaka()">

<!-- YouTube Background Music -->
<div id="yt-player">
    <iframe id="video" width="560" height="315" 
    src="https://www.youtube.com/embed/OgPRcW4ytmE?enablejsapi=1&autoplay=0&loop=1" 
    allow="autoplay"></iframe>
</div>

<div class="container">
    <nav>
        <h2 style="color: var(--gold); letter-spacing: 3px;">SUMAN // NEUPANE</h2>
        <p style="font-size: 0.7rem; opacity: 0.6;">KATHMANDU | G-BASS PROTOCOL</p>
    </nav>

    <div class="hero">
        <div class="photo-box">
            <img src="suman.jpg" alt="Profile Photo">
        </div>
        <div class="content">
            <h1 style="font-size: clamp(2rem, 10vw, 4rem); color: var(--gold);">DHAMAKA<br>INTERFACE</h1>
            <div class="sound-grid">
                <button class="btn" onclick="playEffect('FLUTE RIFF')">G-Bass Flute</button>
                <button class="btn" onclick="playEffect('TABLA BEAT')">Tabla</button>
                <button class="btn" onclick="playEffect('GUITAR STRUM')">Guitar</button>
                <button class="btn" onclick="playEffect('HARMONIUM')">Harmonium</button>
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="btn" style="flex: 1;" onclick="partyPop()">Party Pop</button>
                <button class="btn" style="flex: 1;" onclick="flowerBurst()">Flower Pulse</button>
            </div>
        </div>
    </div>

    <div class="game-section">
        <div class="game-card"><h3>SNAKE_SYS</h3><canvas id="game1"></canvas></div>
        <div class="game-card"><h3>ORB_SYS</h3><canvas id="game2"></canvas></div>
    </div>
</div>

<script>
    let isStarted = false;
    
    // 1. Music & Sound Control
    function startDhamaka() {
        if (!isStarted) {
            const frame = document.getElementById('video');
            frame.src += "&autoplay=1";
            isStarted = true;
            console.log("Music Initialized");
        }
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playEffect(text) {
        // Sound
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(440, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1);
        osc.start(); osc.stop(audioCtx.currentTime + 1);

        // Visual Note
        const el = document.createElement('div');
        el.style.position = 'fixed';
        el.style.left = Math.random() * 80 + '%';
        el.style.top = '50%';
        el.style.color = '#d4af37';
        el.style.fontWeight = 'bold';
        el.innerText = text;
        el.style.transition = '2s';
        document.body.appendChild(el);
        setTimeout(() => { el.style.transform = 'translateY(-200px)'; el.style.opacity = '0'; }, 10);
        setTimeout(() => el.remove(), 2000);
    }

    // 2. Physics Engine (Gravity & Slowdown)
    let particles = [];
    function spawn(type, x, y, isPop) {
        const p = document.createElement('div');
        p.className = 'particle';
        const isConf = type === 'conf';
        
        p.style.width = isConf ? '10px' : '30px';
        p.style.height = isConf ? '10px' : '30px';
        p.style.backgroundColor = isConf ? '#d4af37' : 'transparent';
        if(!isConf) {
            p.innerText = '🌸';
            p.style.fontSize = '24px';
            p.style.pointerEvents = 'auto';
            p.onclick = () => alert("I LOVE YOU");
        }

        let px = x || window.innerWidth / 2;
        let py = y || window.innerHeight;
        let vx = (Math.random() - 0.5) * (isPop ? 30 : 10);
        let vy = isPop ? -25 : -10;
        let op = 1;

        document.body.appendChild(p);
        particles.push({
            update: () => {
                vx *= 0.96; vy *= 0.96; // Air Friction
                vy += 0.15; // Gravity
                px += vx; py += vy; op -= 0.008; // Mid-air vanish
                
                p.style.opacity = op;
                p.style.transform = `translate(${px}px, ${py}px) rotate(${px}deg)`;
                if(op <= 0) { p.remove(); return false; }
                return true;
            }
        });
    }

    function partyPop() { for(let i=0; i<100; i++) spawn('conf', null, null, true); }
    function flowerBurst() { for(let i=0; i<30; i++) spawn('flow', window.innerWidth/2, window.innerHeight/2, false); }

    function animate() {
        particles = particles.filter(p => p.update());
        requestAnimationFrame(animate);
    }
    animate();

    // 3. Mini Games
    const ctx1 = document.getElementById('game1').getContext('2d');
    setInterval(() => {
        ctx1.fillStyle = '#080808'; ctx1.fillRect(0,0,300,150);
        ctx1.fillStyle = '#d4af37'; ctx1.fillRect(Math.random()*280, Math.random()*130, 10, 10);
    }, 100);

    const ctx2 = document.getElementById('game2').getContext('2d');
    let angle = 0;
    function draw() {
        ctx2.clearRect(0,0,300,150);
        ctx2.strokeStyle = '#d4af37';
        ctx2.beginPath();
        ctx2.arc(150 + Math.cos(angle)*50, 75 + Math.sin(angle)*30, 10, 0, Math.PI*2);
        ctx2.stroke();
        angle += 0.05;
        requestAnimationFrame(draw);
    }
    draw();
</script>
</body>
</html>
